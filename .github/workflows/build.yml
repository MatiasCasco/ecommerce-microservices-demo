name: Build Microservices

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      user_service: ${{ steps.filter.outputs.user_service }}
      product_service: ${{ steps.filter.outputs.product_service }}
      order_service: ${{ steps.filter.outputs.order_service }}
      notification_service: ${{ steps.filter.outputs.notification_service }
      common_lib: ${{ steps.filter.outputs.common_lib }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common_lib:
              - "common-lib/**"
            api_gateway:
              - "api-gateway/**"
            user_service:
              - "user-service/**"
            product_service:
              - "product-service/**"
            order_service:
              - "order-service/**"
            notification_service:
              - "notification-service/**"

  build-api-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.api_gateway == 'true' || needs.detect-changes.outputs.common_lib == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Build api-gateway
        run: |
          mvn -B clean install \
            -pl common-lib,api-gateway \
            -am \
            -DskipTests

  build-user-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.user_service == 'true' || needs.detect-changes.outputs.common_lib == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Build user-service
        run: |
          mvn -B clean install \
            -pl common-lib,user-service \
            -am \
            -DskipTests

  build-product-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.product_service == 'true' || needs.detect-changes.outputs.common_lib == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Build product-service
        run: |
          mvn -B clean install \
            -pl common-lib,product-service \
            -am \
            -DskipTests

  build-order-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.order_service == 'true' || needs.detect-changes.outputs.common_lib == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Build order-service
        run: |
          mvn -B clean install \
            -pl common-lib,order-service \
            -am \
            -DskipTests
          
  build-notification-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.notification_service == 'true' || needs.detect-changes.outputs.common_lib == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Build notification-service
        run: |
          mvn -B clean install \
            -pl common-lib,notification-service \
            -am \
            -DskipTests
